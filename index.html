<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio Demo Automatizada</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🎙 Sistema Demo Radio</h1>

<div class="contenedor">


<!-- REGISTRAR TEXTO -->
<div class="panel">

<h2>Registrar Texto</h2>

<textarea id="texto" placeholder="Escribe el texto que será convertido a voz"></textarea>

<button onclick="guardarRegistro()">Guardar Registro</button>

</div>



<!-- REGISTROS GUARDADOS -->
<div class="panel">

<h2>Lista de Registros</h2>

<table>

<thead>
<tr>
<th>Texto</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="listaRegistros">
</tbody>

</table>

</div>



<!-- PROGRAMACION -->
<div class="panel">

<h2>Programar Audio</h2>

<div class="programar">

<input type="time" id="horaProgramada">

<select id="audioProgramado"></select>

<button onclick="programarAudio()">Programar</button>

</div>

<table>

<thead>

<tr>
<th>Hora</th>
<th>Texto</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="listaProgramacion">
</tbody>

</table>

</div>



<!-- CONTROLES -->
<div class="panel">

<h2>Funciones Automáticas</h2>

<button onclick="decirHora()">🕒 Decir Hora</button>

<button onclick="decirClima()">🌡 Decir Clima</button>

</div>


</div>

<script src="app.js"></script>

</body>

</html>
